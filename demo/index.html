<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Agent System — Live Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__inner">
        <a href="/" class="brand">
          <div class="brand__mark">M4</div>
          <div class="brand__text">
            <p class="brand__eyebrow">Curriculum Agent Patterns · 4/5</p>
            <p class="brand__title">Multi-Agent</p>
          </div>
        </a>
        <div class="header-actions">
          <span class="status-badge">Deterministic demo</span>
          <a href="https://github.com/vpeetla-ai/multi-agent-system-pattern" class="btn-ghost" style="padding:0.4rem 0.75rem;font-size:0.8rem;text-decoration:none">GitHub</a>
        </div>
      </div>
    </header>
    <main class="shell app-main">
      <div class="page-hero">
        <p class="eyebrow">Orchestrator + specialists</p>
        <h1>Multi-Agent System Pattern</h1>
        <p class="lede">Chief orchestrator delegates to research and content workers with a critic gate.</p>
      </div>
      <section class="panel">
        <h2>Run demo</h2>
        <div class="inline-actions"><button id="run" type="button">Run platform orchestration</button></div>
        <div id="answer" class="answer"></div>
        <div id="trace" class="trace-events"></div>
      </section>
    </main>
    <footer class="app-footer">Multi-Agent pattern · <a href="https://github.com/vpeetla-ai/multi-agent-system-pattern">vpeetla-ai</a></footer>
    <script>
      const DEMO = {
        answer: "Brief shipped after research + content + critic review.",
        events: [
          { name: "chief.intent", payload: { intent: "content_radar" } },
          { name: "worker.research", payload: { artifacts: ["headlines", "trends"] } },
          { name: "worker.content", payload: { artifacts: ["linkedin_draft", "substack_draft"] } },
          { name: "critic.review", payload: { quality: 92, decision: "ship" } },
        ],
      };
      const trace = document.getElementById("trace");
      document.getElementById("run").onclick = async () => {
        trace.innerHTML = "";
        document.getElementById("answer").textContent = "";
        for (const e of DEMO.events) {
          const el = document.createElement("div");
          el.className = "event live";
          el.innerHTML = `<strong>${e.name}</strong><pre>${JSON.stringify(e.payload, null, 2)}</pre>`;
          trace.appendChild(el);
          await new Promise((r) => setTimeout(r, 700));
          el.classList.remove("live");
          el.classList.add("done");
        }
        document.getElementById("answer").textContent = DEMO.answer;
      };
    </script>
  </body>
</html>
